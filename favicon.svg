<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    AP monogram — warm editorial luxury mark
    Shared vertical stem interlocks the two letters.
    Terracotta A, dark ink P bowl. Transparent background.
  -->
  <defs>
    <clipPath id="counter">
      <path d="M0,0H64V64H0Z M25.5,18 L20.5,32 L30.5,32Z" clip-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- A structure (terracotta #b34a2f) -->
  <g clip-path="url(#counter)">
    <polygon points="24,8 30,8 12,56 6,56" fill="#b34a2f"/>
    <rect x="30" y="8" width="5.5" height="48" fill="#b34a2f"/>
    <rect x="14.5" y="32" width="21" height="4.5" fill="#b34a2f"/>
  </g>

  <!-- P bowl (dark ink #1a1714) -->
  <path d="M35.5,8 L47,8 C55.5,8 55.5,31 47,31 L35.5,31 L35.5,25 L45,25 C49.5,25 49.5,14 45,14 L35.5,14Z" fill="#1a1714"/>
</svg>
