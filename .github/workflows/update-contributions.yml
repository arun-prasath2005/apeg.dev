name: Update Contribution Graph

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch contribution data
        env:
          GH_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
        run: |
          END_DATE=$(date -u +%Y-%m-%dT23:59:59Z)
          YEAR_START=$(date -u -d '1 year ago' +%Y-%m-%dT00:00:00Z)

          # Fetch full year for total and graph (52 weeks)
          QUERY='{ user(login: "arun-prasath2005") { contributionsCollection(from: "'$YEAR_START'", to: "'$END_DATE'") { contributionCalendar { totalContributions weeks { contributionDays { contributionCount date } } } } } }'

          RESPONSE=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$(echo $QUERY | sed 's/"/\\"/g')\"}" \
            https://api.github.com/graphql)

          # Graph: full year (52 weeks)
          COUNTS=$(echo "$RESPONSE" | jq -r '[.data.user.contributionsCollection.contributionCalendar.weeks[-52:][] | .contributionDays[] | .contributionCount] | join(",")')
          DATES=$(echo "$RESPONSE" | jq -r '[.data.user.contributionsCollection.contributionCalendar.weeks[-52:][] | .contributionDays[] | .date] | map("\"" + . + "\"") | join(",")')
          # Total: full year
          TOTAL=$(echo "$RESPONSE" | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions')

          echo "Fetched $TOTAL contributions"
          echo "COUNTS=$COUNTS" >> $GITHUB_ENV
          echo "DATES=$DATES" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Update index.html
        run: |
          # Format with comma (e.g. 5888 -> 5,888)
          TOTAL_FMT=$(echo $TOTAL | sed ':a;s/\B[0-9]\{3\}\>/,&/;ta')

          sed -i "s/const data=\[.*\];/const data=[$COUNTS];/" index.html
          sed -i "s/const dates=\[.*\];/const dates=[$DATES];/" index.html
          sed -i "s/[0-9,]\+ this year\"/${TOTAL_FMT} this year\"/g" index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html || {
            git add index.html
            git commit -m "Update contribution graph data [automated]"
            git push
          }
