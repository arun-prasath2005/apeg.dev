name: Update Contribution Graph

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch contribution data
        env:
          GH_TOKEN: ${{ secrets.CONTRIB_TOKEN }}
        run: |
          END_DATE=$(date -u +%Y-%m-%dT23:59:59Z)
          START_DATE=$(date -u -d '26 weeks ago' +%Y-%m-%dT00:00:00Z)

          QUERY='{ user(login: "arun-prasath2005") { contributionsCollection(from: "'$START_DATE'", to: "'$END_DATE'") { contributionCalendar { totalContributions weeks { contributionDays { contributionCount date } } } } } }'

          RESPONSE=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$(echo $QUERY | sed 's/"/\\"/g')\"}" \
            https://api.github.com/graphql)

          COUNTS=$(echo "$RESPONSE" | jq -r '[.data.user.contributionsCollection.contributionCalendar.weeks[-26:][] | .contributionDays[] | .contributionCount] | join(",")')
          DATES=$(echo "$RESPONSE" | jq -r '[.data.user.contributionsCollection.contributionCalendar.weeks[-26:][] | .contributionDays[] | .date] | map("\"" + . + "\"") | join(",")')
          TOTAL=$(echo "$RESPONSE" | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions')

          echo "Fetched $TOTAL contributions"
          echo "COUNTS=$COUNTS" >> $GITHUB_ENV
          echo "DATES=$DATES" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Update index.html
        run: |
          TOTAL_FMT=$(printf "%'d" $TOTAL)

          sed -i "s/const data=\[.*\];/const data=[$COUNTS];/" index.html
          sed -i "s/const dates=\[.*\];/const dates=[$DATES];/" index.html
          sed -i "s/[0-9,]* contributions this year/${TOTAL_FMT} contributions this year/g" index.html
          sed -i "s/[0-9,]* this year\"/${TOTAL_FMT} this year\"/g" index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html || {
            git add index.html
            git commit -m "Update contribution graph data [automated]"
            git push
          }
